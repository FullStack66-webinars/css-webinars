<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Olimpic rings</title>
  <style>
    .rings {
      text-align: center;
      margin-top: 70px;
    }
    .row {
      margin: 0 0 20px;
    }
    .ring-symbol{
      font-size: 300px;
      margin: 0 8px;
    }
    .blue{
      color: blue;
    }
    .yellow{
      color: yellow;
    }
    .red{
      color: red;
    }
    .black{
      color: black;
    }
    .green{
      color: green;
    }

  </style>
</head>
<body>
<div class="rings">
  <div class="row">
    <span class="ring-symbol blue">○</span>
    <span class="ring-symbol black">○</span>
    <span class="ring-symbol red">○</span>
  </div>
  <div class="row">
    <span  class="ring-symbol yellow">○</span>
    <span  class="ring-symbol green">○</span>
  </div>

</div>

</body>
</html>
